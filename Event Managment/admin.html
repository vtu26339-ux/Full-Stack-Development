<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page">

<div class="container">
<h1 class="dashboard-title">Admin Dashboard</h1>

<div class="form-card">

  <h3>Add Event</h3>

  <input id="title" placeholder="Event Title">
  <input id="description" placeholder="Description">
  <input id="date" type="date">
  <input id="venue" placeholder="Venue">
  <input id="price" placeholder="Price">
  <input id="seats" placeholder="Total Seats">

  <button onclick="addEvent()" class="primary-btn">Add Event</button>

</div>

<hr>


<h2 class="section-title">All Events</h2>
<div id="adminEvents" style="padding:20px;"></div>


<h2 style="text-align:center;">Dashboard Status</h2>

<div style="display:flex; justify-content:center; gap:20px; margin:20px;">

  <div class="card">
    <h3>Total Users</h3>
    <p id="usersCount">0</p>
  </div>

  <div class="card">
    <h3>Total Bookings</h3>
    <p id="bookingsCount">0</p>
  </div>

</div>

<h2 style="text-align:center;">Bookings</h2>
<div id="bookings"></div>
</div>

<script src="admin.js"></script>
</body>
</html>
