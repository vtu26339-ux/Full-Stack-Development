<!DOCTYPE html>
<html>
<head>
    <title>Order Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Customer Order History</h1>

<table>
    <thead>
        <tr>
            <th>Customer</th>
            <th>Product</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Total</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody id="orderTable"></tbody>
</table>

<h2>Highest Value Order</h2>
<p id="highest"></p>

<h2>Most Active Customer</h2>
<p id="active"></p>

</body>
<script src="script.js"></script>
</html>
